plugins {
    id 'java'
    // 1. Adiciona o plugin de aplicação
    id 'application'
}

group = 'Restaurantes'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    // 2. Garante que o driver do MySQL está aqui
    implementation 'mysql:mysql-connector-java:8.0.33'

    testImplementation platform('org.junit:junit-bom:5.9.1')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

// 3. Define qual é a classe que contém o public static void main
application {
    mainClass = 'Main'
}

// 4. Configuração para permitir entrada de dados (Scanner) via terminal do Gradle
run {
    standardInput = System.in
}

test {
    useJUnitPlatform()
}